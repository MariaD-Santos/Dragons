<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * {
      margin: 0px;
      box-sizing: border-box;
      padding: 0px;
      
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      background-color: black;
    }

    .label{
      color: white;
    }

    .input {
      width: 200px;
    }
  </style>
</head>

<body>

  <form action="/cadastro/post" method="post">
    <h1>Cadastre-se na Dragon's</h1>
    <div class="field">
      <label class="label">Usuário</label>
      <div class="control">
        <input class="input" type="text" name="usuario" placeholder="Digite seu usuário:" id="usuario">
      </div>
    </div>

    <div class="field">
      <label class="label">Senha</label>
      <div class="control has-icons-left has-icons-right">
        <input name="senha" class="input is-text" type="textd" placeholder="Digite sua senha:" id="senha">
      </div>
    </div>
    <div class="field is-grouped">
      <div class="control">
        <button type="submit" class="button is-link">Cadastrar</button>
      </div>
    </div>
  </form>
</body>

</html>

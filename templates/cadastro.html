<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    /* Fonte futurista e robusta */
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Orbitron', sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      /* Fundo com textura de malha escura */
      background-color: #050505;
      background-image:
        linear-gradient(rgba(255, 0, 0, 0.05) 1px, transparent 1px),
        linear-gradient(90px, rgba(255, 0, 0, 0.05) 1px, transparent 1px);
      background-size: 30px 30px;
    }

    form {
      background: linear-gradient(145deg, #1a0000, #0a0a0a);
      padding: 3rem;
      border-radius: 0px;
      /* Bordas retas para parecer militar/tech */
      border-left: 4px solid #ff0000;
      border-right: 4px solid #7a0000;
      box-shadow: 0 0 30px rgba(0, 0, 0, 1), 0 0 15px rgba(255, 0, 0, 0.2);
      width: 380px;
      position: relative;
      overflow: hidden;
    }

    /* Detalhe decorativo no topo */
    form::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #ff0000, transparent);
    }

    h1 {
      color: #ffffff;
      font-size: 1.4rem;
      margin-bottom: 2rem;
      text-transform: uppercase;
      letter-spacing: 4px;
      text-align: center;
    }

    h1 span {
      color: #ff0000;
    }

    .label {
      color: #ff4d4d !important;
      font-size: 0.75rem;
      letter-spacing: 1px;
      margin-bottom: 0.8rem;
    }

    .control {
      margin-bottom: 1.5rem;
    }

    .input {
      background: #000 !important;
      border: 1px solid #333 !important;
      border-radius: 0 !important;
      color: #ff0000 !important;
      height: 45px;
      font-size: 0.9rem;
      transition: all 0.4s ease;
    }

    .input:focus {
      border-color: #ff0000 !important;
      box-shadow: inset 0 0 10px rgba(255, 0, 0, 0.3) !important;
      outline: none;
    }

    .input::placeholder {
      color: #444;
      font-size: 0.8rem;
    }

    .button.is-link {
      background: transparent !important;
      border: 2px solid #ff0000 !important;
      color: #ff0000 !important;
      width: 100%;
      height: 50px;
      text-transform: uppercase;
      font-weight: bold;
      letter-spacing: 3px;
      position: relative;
      transition: all 0.3s;
      cursor: pointer;
    }

    .button.is-link:hover {
      background: #ff0000 !important;
      color: #000 !important;
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
    }

    /* Ajuste para o Bulma não quebrar o layout */
    .field.is-grouped {
      display: block;
    }
  </style>
</head>

<body>

  <form action="/cadastro/post" method="post">
    <h1>Cadastre-se na Dragon's</h1>
    <div class="field">
      <label class="label">Usuário</label>
      <div class="control">
        <input class="input" type="text" name="usuario" placeholder="Digite seu usuário:" id="usuario">
      </div>
    </div>

    <div class="field">
      <label class="label">Senha</label>
      <div class="control has-icons-left has-icons-right">
        <input name="senha" class="input is-text" type="textd" placeholder="Digite sua senha:" id="senha">
      </div>
    </div>
    <div class="field is-grouped">
      <div class="control">
        <button type="submit" class="button is-link">Cadastrar</button>
      </div>
    </div>
  </form>
</body>

</html>
